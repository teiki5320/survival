name: train_cosy
description: "Side-scroller train, cosy post-apocalyptic narrative game."
publish_to: "none"
version: 0.11.40+41

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.1.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/background/
    - assets/objects/
    - assets/characters/
    - assets/audio/
