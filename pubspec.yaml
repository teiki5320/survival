name: train_cosy
description: "Side-scroller train, cosy post-apocalyptic narrative game."
publish_to: "none"
version: 0.11.17+18

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/background/
    - assets/objects/
    - assets/characters/
    - assets/audio/
