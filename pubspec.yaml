name: train_cosy
description: "Cosy train wagon interior — visual base for a narrative game."
publish_to: "none"
version: 0.5.4+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/config/scene.json
    - assets/background/
    - assets/objects/
    - assets/characters/
